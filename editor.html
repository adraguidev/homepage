<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor JSON</title>
    <link rel="stylesheet" href="editor.css" />
  </head>
  <body>
    <div class="container">
      <h1>Editor JSON</h1>
      <textarea id="jsonInput" placeholder="Edit your JSON here..."></textarea>
      <button id="saveButton">Save JSON</button>
    </div>
    <!-- Modal para clave maestra -->
    <div id="masterKeyModal" class="modal">
      <div class="modal__content">
        <span class="modal__close">&times;</span>
        <h2>Enter Master Key</h2>
        <input type="password" id="masterKeyInput" placeholder="Master Key" />
        <button id="verifyKeyButton">Verify</button>
      </div>
    </div>
    <script src="editor.js"></script>
  </body>
</html>
